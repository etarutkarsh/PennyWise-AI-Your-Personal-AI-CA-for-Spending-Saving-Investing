server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: pennywise-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/pennywise}
    username: ${DB_USERNAME:pennywise}
    password: ${DB_PASSWORD:pennywise}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

security:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-in-production-min-256-bits-long}
    access-token-expiry-ms: 3600000       # 1 hour
    refresh-token-expiry-ms: 2592000000   # 30 days

ai:
  openai:
    api-key: ${OPENAI_API_KEY:}
    model: gpt-4o-mini
    base-url: https://api.openai.com/v1

logging:
  level:
    root: INFO
    com.pennywise: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info
