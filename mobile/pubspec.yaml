name: pennywise_ai
description: "PennyWise AI - Your Personal AI CA for Spending, Saving & Investing"
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_bloc: ^8.1.5
  equatable: ^2.0.5

  # Routing
  go_router: ^14.2.0

  # Networking
  dio: ^5.4.3
  pretty_dio_logger: ^1.3.1

  # Local storage / secure storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI
  google_fonts: ^6.2.1
  fl_chart: ^0.68.0
  lottie: ^3.1.2
  shimmer: ^3.0.0
  intl: ^0.19.0

  # Firebase (auth, push, analytics, crashlytics - wired in Phase 2/3)
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  firebase_messaging: ^15.0.0
  firebase_analytics: ^11.2.0
  firebase_crashlytics: ^4.0.0

  # SMS / notification parsing (Android only - Feature 1)
  another_telephony: ^0.2.1

  # OCR (Feature: Receipt OCR)
  google_mlkit_text_recognition: ^0.13.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
  fonts: []
